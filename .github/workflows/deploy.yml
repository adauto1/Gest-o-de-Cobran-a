name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.237.7
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: bash /root/deploy.sh
