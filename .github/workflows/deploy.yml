name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          echo "=== DEBUG: Testando sudo ==="
          whoami
          which sudo
          which systemctl
          /usr/bin/sudo --version
          /usr/bin/sudo -n /usr/bin/systemctl restart gestor-cobranca.service
          /usr/bin/sudo -n /usr/bin/systemctl status gestor-cobranca.service --no-pager
          echo "=== Deploy concluído ==="
