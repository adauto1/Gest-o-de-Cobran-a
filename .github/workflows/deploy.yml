name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script_stop: true
        script: |
          cd /home/deploy/Gest-o-de-Cobran-a
          git pull origin main
          pip install -r requirements.txt --break-system-packages
          sudo -n /usr/bin/systemctl restart gestor-cobranca.service
          sudo -n /usr/bin/systemctl status gestor-cobranca.service --no-pager
