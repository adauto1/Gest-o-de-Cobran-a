{% extends "layout.html" %}
{% block login_content %}
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .login-page::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(220, 38, 38, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
    animation: loginBgPulse 12s ease-in-out infinite alternate;
  }

  @keyframes loginBgPulse {
    0% {
      transform: translate(0, 0) scale(1);
    }

    100% {
      transform: translate(-2%, -2%) scale(1.05);
    }
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 48px 40px 40px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03);
  }

  .login-brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-brand img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    border-radius: 16px;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
  }

  .login-brand-title {
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.3px;
  }

  .login-brand-sub {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .login-card .login-alert {
    background: rgba(220, 38, 38, 0.15);
    border: 1px solid rgba(220, 38, 38, 0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .login-field label {
    font-size: 12px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .login-field input {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: #f1f5f9;
    font-family: inherit;
    outline: none;
    transition: all 0.25s ease;
  }

  .login-field input::placeholder {
    color: #475569;
  }

  .login-field input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    background: rgba(15, 23, 42, 0.8);
  }

  .login-btn {
    width: 100%;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
    margin-top: 6px;
    box-shadow: 0 4px 14px rgba(220, 38, 38, 0.3);
  }

  .login-btn:hover {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
    transform: translateY(-1px);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-footer {
    text-align: center;
    margin-top: 28px;
    color: #475569;
    font-size: 12px;
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 36px 24px 28px;
      border-radius: 16px;
    }

    .login-brand img {
      width: 64px;
      height: 64px;
    }

    .login-brand-title {
      font-size: 19px;
    }
  }
</style>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/logo.png" alt="Portal Móveis">
      <div class="login-brand-title">Portal Móveis</div>
      <div class="login-brand-sub">Gestor de Cobrança</div>
    </div>

    {% if error %}
    <div class="login-alert">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="login-field">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>

      <div class="login-field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button class="login-btn" type="submit">Entrar</button>
    </form>

    <div class="login-footer">
      &copy; {{ now().year if now is defined else "2026" }} Portal Móveis — Sistema Interno
    </div>
  </div>
</div>
{% endblock %}
