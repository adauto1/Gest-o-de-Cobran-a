{% extends "layout.html" %}
{% block login_content %}
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .login-page::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 40%, var(--primary) 0%, transparent 10%),
      radial-gradient(circle at 70% 60%, var(--danger-bg) 0%, transparent 10%);
    opacity: 0.1;
    animation: loginBgPulse 20s ease-in-out infinite alternate;
  }

  @keyframes loginBgPulse {
    0% {
      transform: translate(0, 0) scale(1);
    }

    100% {
      transform: translate(-2%, -2%) scale(1.05);
    }
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: var(--shadow-lg);
  }

  .login-brand {
    text-align: center;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .login-brand img {
    display: block;
    width: 165px;
    height: auto;
    object-fit: contain;
    margin: 0 auto 8px auto;
  }

  .login-brand-title {
    display: none;
  }

  .login-brand-sub {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    text-align: center;
    display: block;
    width: 100%;
    transform: translateX(5%);
  }

  .login-card .login-alert {
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .login-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .login-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: all 0.25s ease;
  }

  .login-field input::placeholder {
    color: var(--text-3);
  }

  .login-field input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    background: var(--surface);
  }

  .login-btn {
    width: 100%;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary-text);
    background: var(--primary);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
    margin-top: 6px;
    box-shadow: var(--shadow);
  }

  .login-btn:hover {
    filter: brightness(0.95);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-footer {
    text-align: center;
    margin-top: 28px;
    color: var(--text-3);
    font-size: 12px;
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 36px 24px 28px;
      border-radius: 16px;
    }

    .login-brand img {
      width: 64px;
      height: 64px;
    }

    .login-brand-title {
      font-size: 19px;
    }
  }
</style>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/logo.png" alt="Portal Móveis">
      <!-- Título removido, apenas logo -->
      <div class="login-brand-sub">Gestor de Cobrança</div>
    </div>

    {% if error %}
    <div class="login-alert">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="login-field">
        <label>Email</label>
        <input type="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>

      <div class="login-field">
        <label>Senha</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button class="login-btn" type="submit">Entrar</button>
    </form>

    <div class="login-footer">
      &copy; {{ now().year if now is defined else "2026" }} Portal Móveis — Sistema Interno
    </div>
  </div>
</div>
{% endblock %}
