{% extends "layout.html" %}
{% block login_content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/logo.png" alt="Portal Móveis">
      <div class="login-brand-sub">Gestor de Cobrança</div>
    </div>

    <h1>Entrar</h1>
    <p class="muted" style="margin-bottom:18px">Acesso interno do sistema de cobrança.</p>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form">
      <label>Email</label>
      <input type="email" name="email" placeholder="seu@email.com" required>

      <label>Senha</label>
      <input type="password" name="password" placeholder="••••••••" required>

      <button class="btn primary" type="submit" style="margin-top:6px">Entrar</button>
    </form>

    <div class="tip">
      <b>Primeiro acesso:</b> <code>admin@portalmoveis.local</code> · senha <code>admin123</code>
    </div>
  </div>
</div>
{% endblock %}
