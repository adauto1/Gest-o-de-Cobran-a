{% extends "layout.html" %}
{% block content %}
<style>
  .cal-grid { display:grid; grid-template-columns: repeat(7,1fr); gap:6px; margin-top:16px; }
  .cal-day-hdr { text-align:center; font-size:11px; font-weight:700; color:var(--text-3); padding:6px 0; text-transform:uppercase; }
  .cal-cell { min-height:80px; border:1px solid var(--border); border-radius:8px; padding:8px; background:var(--surface); cursor:pointer; transition:all .15s; }
  .cal-cell:hover { border-color:#6366f1; box-shadow:0 0 0 2px rgba(99,102,241,0.15); }
  .cal-cell.empty { background:transparent; border-color:transparent; cursor:default; }
  .cal-cell.today { border-color:#6366f1; background:rgba(99,102,241,0.04); }
  .cal-cell .day-num { font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:4px; }
  .cal-cell.today .day-num { color:#6366f1; }
  .cal-badge { font-size:11px; font-weight:700; padding:2px 6px; border-radius:6px; display:inline-block; }
  .badge-pendente { background:#fef3c7; color:#92400e; }
  .badge-cumprida { background:#dcfce7; color:#166534; }
  .badge-nao_cumprida { background:#fee2e2; color:#991b1b; }
  .badge-vencida { background:#f3f4f6; color:#6b7280; }
  .detail-panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-top:20px; }
</style>

<div class="card">
  <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <h1>Calendário de Promessas</h1>
      <p class="muted small">Acompanhe promessas de pagamento dia a dia</p>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button onclick="navMes(-1)" class="btn secondary">‹</button>
      <span id="mesLabel" style="font-weight:700; font-size:15px; min-width:140px; text-align:center;"></span>
      <button onclick="navMes(1)" class="btn secondary">›</button>
    </div>
  </div>

  <!-- Legendas -->
  <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
    <span class="cal-badge badge-pendente">🕐 Pendente</span>
    <span class="cal-badge badge-cumprida">✅ Cumprida</span>
    <span class="cal-badge badge-nao_cumprida">❌ Não Cumprida</span>
    <span class="cal-badge badge-vencida">⏰ Vencida</span>
  </div>

  <!-- Cabeçalho dos dias da semana -->
  <div class="cal-grid" style="margin-top:16px;">
    {% for d in ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'] %}
    <div class="cal-day-hdr">{{ d }}</div>
    {% endfor %}
  </div>

  <div class="cal-grid" id="calGrid">
    <div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-3);">Carregando...</div>
  </div>

  <!-- Painel de detalhes -->
  <div class="detail-panel" id="detailPanel" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 id="detailTitle" style="font-size:15px; font-weight:700;"></h3>
      <button onclick="document.getElementById('detailPanel').style.display='none'" class="btn small secondary">✕</button>
    </div>
    <div id="detailList"></div>
  </div>
</div>

<script>
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let curYear = new Date().getFullYear();
  let curMonth = new Date().getMonth() + 1;

  function navMes(delta) {
    curMonth += delta;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    if (curMonth < 1) { curMonth = 12; curYear--; }
    loadMes();
  }

  async function loadMes() {
    const mesStr = `${curYear}-${String(curMonth).padStart(2,'0')}`;
    document.getElementById('mesLabel').textContent = `${MESES[curMonth-1]} ${curYear}`;
    document.getElementById('detailPanel').style.display = 'none';

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-3);">Carregando...</div>';

    try {
      const res = await fetch(`/api/promessas/mes?mes=${mesStr}`);
      const diasData = await res.json(); // {dia: {count, valor_total, clientes:[...]}}

      // Primeiro dia da semana do mês (0=dom, 1=seg, ...)
      const firstDay = new Date(curYear, curMonth-1, 1).getDay();
      const daysInMonth = new Date(curYear, curMonth, 0).getDate();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      grid.innerHTML = '';

      // Células vazias antes do primeiro dia
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-cell empty';
        grid.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const info = diasData[d.toString()] || null;
        const cell = document.createElement('div');
        const isToday = dateKey === todayStr;
        cell.className = 'cal-cell' + (isToday ? ' today' : '');

        let badgesHtml = '';
        if (info && info.count > 0) {
          // Contar por status
          const counts = {};
          (info.clientes || []).forEach(c => { counts[c.status_promessa] = (counts[c.status_promessa]||0)+1; });
          if (counts.PENDENTE) badgesHtml += `<span class="cal-badge badge-pendente">🕐 ${counts.PENDENTE}</span> `;
          if (counts.CUMPRIDA) badgesHtml += `<span class="cal-badge badge-cumprida">✅ ${counts.CUMPRIDA}</span> `;
          if (counts.NAO_CUMPRIDA) badgesHtml += `<span class="cal-badge badge-nao_cumprida">❌ ${counts.NAO_CUMPRIDA}</span> `;
          if (counts.VENCIDA) badgesHtml += `<span class="cal-badge badge-vencida">⏰ ${counts.VENCIDA}</span> `;
          cell.onclick = () => showDetail(d, dateKey, info);
          cell.title = `${info.count} promessa(s) — Clique para ver`;
        }

        cell.innerHTML = `<div class="day-num">${d}</div>${badgesHtml}`;
        grid.appendChild(cell);
      }
    } catch(e) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--danger);">Erro ao carregar: ${e.message}</div>`;
    }
  }

  function showDetail(day, dateKey, info) {
    const panel = document.getElementById('detailPanel');
    const title = document.getElementById('detailTitle');
    const list = document.getElementById('detailList');

    title.textContent = `Promessas para ${String(day).padStart(2,'0')}/${String(curMonth).padStart(2,'0')}/${curYear} (${info.count} total)`;
    panel.style.display = 'block';

    if (!info.clientes || !info.clientes.length) {
      list.innerHTML = '<div class="muted small">Sem detalhes disponíveis.</div>';
      return;
    }

    const statusColors = { PENDENTE:'#92400e', CUMPRIDA:'#166534', NAO_CUMPRIDA:'#991b1b', VENCIDA:'#6b7280' };
    const statusBg = { PENDENTE:'#fef3c7', CUMPRIDA:'#dcfce7', NAO_CUMPRIDA:'#fee2e2', VENCIDA:'#f3f4f6' };
    const statusEmoji = { PENDENTE:'🕐', CUMPRIDA:'✅', NAO_CUMPRIDA:'❌', VENCIDA:'⏰' };

    list.innerHTML = '';
    info.clientes.forEach(c => {
      const st = c.status_promessa || 'PENDENTE';
      const row = document.createElement('div');
      row.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--border);';
      row.innerHTML = `
        <div>
          <a href="/customers/${c.id}" style="font-weight:600; color:var(--primary);">${c.nome}</a>
          <div class="muted small">${c.telefone || 'Sem telefone'}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-weight:700;">R$ ${Number(c.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
          <span style="font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; background:${statusBg[st]}; color:${statusColors[st]};">
            ${statusEmoji[st]} ${st.replace(/_/g,' ')}
          </span>
        </div>`;
      list.appendChild(row);
    });

    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.addEventListener('DOMContentLoaded', loadMes);
</script>
{% endblock %}
